- name: Sandbox networking for netplan hosts
  hosts: ssh_nodes:!routers:!windows_hosts
  become: true
  pre_tasks:
    - name: Get systemd-resolved status (using command)
      command: resolvectl status
      register: resolved_status
      changed_when: false
      check_mode: false
      failed_when: false

    - name: Extract DNS Servers (using regex - handles global and per-link)
      set_fact:
        resolved_upstream_dns: "{{ resolved_status.stdout | regex_findall('DNS Servers: (.*)') | map('trim') | join(' ') | split() }}"
      when: resolved_status.rc == 0

  tasks:
    - name: Skip for non-netplan hosts
      ansible.builtin.meta: end_host
      when: ansible_distribution != 'Ubuntu' and (ansible_distribution != 'Debian' or ansible_distribution_version is not version('12', '>='))

  roles:
    - role: interface
      interface_mtu: "{{ hostvars['proxy-jump']['ansible_default_ipv4']['mtu'] }}"
      interface_interfaces: '
      {%- import "roles/common/templates/network.j2" as network with context -%}
      {%- set variables = namespace(interfaces=[]) -%}
      {%- set variables.interfaces = variables.interfaces + [{
        "interface_default_gateway": ansible_default_ipv4.gateway,
        "interface_mac": ansible_default_ipv4.macaddress,
        "interface_ip": ansible_default_ipv4.address,
        "interface_net_prefix": ansible_default_ipv4.prefix,
        "interface_device": ansible_default_ipv4.interface
      }] -%}
      {%- if host_network_interfaces is defined and host_network_interfaces -%}
        {%- for interface in host_network_interfaces -%}
          {%- set device = network.mac_to_interface(interface.mac) -%}
          {%- if device and device != ansible_default_ipv4.interface -%}
            {%- set variables.interfaces = variables.interfaces + [{
              "interface_mac": interface.mac,
              "interface_ip": interface.ip,
              "interface_net_prefix": interface.net_prefix,
              "interface_device": device
            }] -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endif -%}
      {{ variables.interfaces }}'

- name: Test sandbox networking
  hosts: ssh_nodes:!routers:!windows_hosts
  tasks:
  - command: 'ping -c 3 {{ hostvars["man"]["default_gateway_interface_ip"] }}'
    changed_when: false
    register: ping_result
    until: ping_result is not failed
    retries: 18
    delay: 10

- name: remove stack name prefix from hostnames of linux hosts
  hosts: ssh_nodes:!routers:!windows_hosts
  become: true
  tasks:
    - name: set a new hostname
      hostname:
        name: '{{ inventory_hostname }}'

- name: check the connection with windows virtual machines
  hosts: windows_hosts
  gather_facts: false
  tasks:
  - name: Wait 1600 seconds for target connection to become reachable/usable
    wait_for_connection:
      connect_timeout: 10
      timeout: 1600

  - name: Gather facts
    setup:

  - name: test sandbox networking
    win_command: 'ping {{ hostvars["man"]["default_gateway_interface_ip"] }}'
    changed_when: false

- name: Remove stack name prefix from hostnames of windows hosts
  hosts: windows_hosts
  tasks:
  - name: set a new hostname
    win_hostname:
      name: '{{ inventory_hostname }}'
    register: win_hostname_return_value

  - name: reboot machine
    win_reboot:
    when: win_hostname_return_value.reboot_required
